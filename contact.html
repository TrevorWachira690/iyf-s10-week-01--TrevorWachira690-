<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f4f4f4;
            color: #333;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        fieldset {
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        legend {
            font-weight: bold;
            font-size: 1.1rem;
            padding: 0 10px;
            color: #444;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.95rem;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #0076ff;
        }

        .optional {
            font-weight: normal;
            font-size: 0.85rem;
            color: #888;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-group label {
            margin: 0;
            font-weight: normal;
        }

        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background-color: #0076ff;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
        }

        button[type="submit"]:hover {
            background-color: #005ecc;
        }
    </style>
</head>
<body>

    <h1>Contact Us</h1>

    <form action="#" method="POST">

        <!-- Personal Information -->
        <fieldset>
            <legend>Personal Information</legend>

            <label for="full-name">Full Name</label>
            <input
                type="text"
                id="full-name"
                name="full-name"
                placeholder="e.g. Trevor Wachira"
                required
            >

            <label for="email">Email Address</label>
            <input
                type="email"
                id="email"
                name="email"
                placeholder="e.g. trevor@email.com"
                required
            >

            <label for="phone">Phone Number <span class="optional">(optional)</span></label>
            <input
                type="tel"
                id="phone"
                name="phone"
                placeholder="e.g. +254 700 000 000"
            >
        </fieldset>

        <!-- Message Details -->
        <fieldset>
            <legend>Message Details</legend>

            <label for="subject">Subject</label>
            <select id="subject" name="subject" required>
                <option value="" disabled selected>Select a subject</option>
                <option value="general">General Enquiry</option>
                <option value="support">Technical Support</option>
                <option value="feedback">Feedback</option>
            </select>

            <label for="message">Message</label>
            <textarea
                id="message"
                name="message"
                rows="6"
                placeholder="Write your message here (minimum 50 characters)..."
                minlength="50"
                required
            ></textarea>
        </fieldset>

        <!-- Preferences -->
        <fieldset>
            <legend>Preferences</legend>

            <div class="checkbox-group">
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to our newsletter for updates and news</label>
            </div>
        </fieldset>

        <button type="submit">Send Message</button>

    </form>

</body>
</html>
